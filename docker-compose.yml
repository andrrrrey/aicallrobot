version: "3.9"

services:
  ai-robot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-robot
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./recordings:/app/recordings
      - ./scenarios:/app/scenarios
      - ./knowledge_base:/app/knowledge_base
      - ./data:/app/data
    networks:
      - ai-network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: ai-robot-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - ai-network
    depends_on:
      - ai-robot

  redis:
    image: redis:7-alpine
    container_name: ai-robot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ai-network

  postgres:
    image: postgres:16-alpine
    container_name: ai-robot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: robot
      POSTGRES_PASSWORD: robot
      POSTGRES_DB: airobot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robot -d airobot"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ai-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  caddy-data:
  caddy-config:
