id: default
name: "Тестовый сценарий обзвона"
description: "Базовый сценарий для тестирования голосового контура AI-робота"

greeting: "Здравствуйте! Меня зовут Алиса. Удобно ли вам сейчас говорить?"

system_prompt: |
  Ты — AI-ассистент по имени Алиса, выполняющий исходящие звонки от имени компании.
  Веди вежливый, деловой диалог на русском языке.
  Отвечай кратко, по существу — не более 2-3 предложений за раз.
  Если клиент не хочет разговаривать — вежливо прощайся.
  Если клиент задаёт вопрос, на который ты не знаешь ответа — предложи перевести на специалиста.

farewell_positive: "Спасибо за уделённое время! Всего доброго, до свидания."
farewell_negative: "Понял, спасибо за ответ. Хорошего вам дня!"

objection_responses:
  no_time: "Понимаю, что вы заняты. Когда вам будет удобно, чтобы я перезвонила?"
  not_interested: "Понимаю. Могу я спросить — что именно вас останавливает?"
  already_have: "Отлично, что у вас уже есть решение! Хотели бы вы узнать, чем наше предложение отличается?"
  too_expensive: "Понимаю ваши опасения. Позвольте рассказать о гибких условиях?"

steps:
  - id: start
    greeting: "Здравствуйте! Удобно ли вам сейчас говорить?"
    prompt: "Определи, согласен ли клиент общаться"
    on_positive: pitch
    on_negative: farewell
    on_unknown: retry_start
    max_retries: 2

  - id: retry_start
    greeting: "Извините, не расслышала. Вам удобно сейчас говорить?"
    on_positive: pitch
    on_negative: farewell
    on_unknown: farewell

  - id: pitch
    greeting: "Отлично! Я звоню, чтобы рассказать вам о нашем предложении. Вам интересно узнать подробнее?"
    prompt: "Определи, заинтересован ли клиент в предложении"
    on_positive: details
    on_negative: farewell
    on_objection: handle_objection

  - id: handle_objection
    greeting: ""
    prompt: "Клиент возразил. Используй подходящий ответ на возражение из списка."
    on_positive: details
    on_negative: farewell

  - id: details
    greeting: "Замечательно! Могу я уточнить, когда вам будет удобно обсудить подробности с нашим специалистом?"
    prompt: "Определи, готов ли клиент назначить время"
    on_positive: schedule
    on_negative: farewell

  - id: schedule
    greeting: "Отлично, я зафиксирую это время. Наш специалист свяжется с вами. Спасибо за ваше время!"
    is_final: true

  - id: farewell
    greeting: "Понял, спасибо за ваше время. Хорошего дня!"
    is_final: true

  - id: transfer
    greeting: "Сейчас переведу вас на специалиста. Оставайтесь на линии."
    transfer_to_operator: true
    is_final: true
